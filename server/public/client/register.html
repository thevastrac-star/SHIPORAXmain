<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SHIPORAX – Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#F1F3F8;position:relative;overflow-x:hidden;padding:20px 0;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle at 1px 1px,rgba(13,27,62,.05) 1px,transparent 0);
  background-size:36px 36px;pointer-events:none;
}
.deco{position:fixed;border-radius:50%;pointer-events:none}
.d1{width:500px;height:500px;background:radial-gradient(rgba(240,90,34,.12),transparent);top:-150px;right:-120px}
.d2{width:400px;height:400px;background:radial-gradient(rgba(13,27,62,.1),transparent);bottom:-100px;left:-80px}

.wrap{position:relative;z-index:10;width:100%;max-width:460px;padding:20px}

.brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
.brand-icon{width:48px;height:48px;border-radius:14px;background:#F05A22;display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 8px 24px rgba(240,90,34,.3)}
.brand-name{font-size:1.5rem;font-weight:800;color:#0D1B3E;letter-spacing:-.03em}
.brand-name em{color:#F05A22;font-style:normal}

.card{
  background:#fff;border:1.5px solid #E5E7EB;border-radius:20px;padding:36px;
  box-shadow:0 4px 24px rgba(0,0,0,.07);position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#0D1B3E,#1A2F5E,#F05A22);border-radius:20px 20px 0 0}

.header{text-align:center;margin-bottom:28px}
.icon-wrap{width:64px;height:64px;border-radius:16px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:rgba(240,90,34,.08);border:1.5px solid rgba(240,90,34,.2)}
.header h1{font-size:1.5rem;font-weight:800;color:#0D1B3E;letter-spacing:-.03em}
.header p{color:#6B7280;font-size:.875rem;margin-top:6px}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}

.form-group{margin-bottom:14px}
label{display:block;font-size:.72rem;font-weight:600;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em}
input{width:100%;padding:12px 14px;border:1.5px solid #D1D5DB;border-radius:10px;font-size:.92rem;outline:none;background:#FAFBFF;color:#0D1B3E;transition:.2s;font-family:'Inter',sans-serif}
input::placeholder{color:#9CA3AF}
input:focus{background:#fff;border-color:#F05A22;box-shadow:0 0 0 3px rgba(240,90,34,.1)}

.divider{display:flex;align-items:center;gap:10px;margin:18px 0}
.divider hr{flex:1;border:none;border-top:1px solid #E5E7EB}
.divider span{font-size:.72rem;color:#9CA3AF;font-weight:500;white-space:nowrap}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-primary{background:#F05A22;color:#fff;box-shadow:0 4px 16px rgba(240,90,34,.35)}
.btn-primary:hover{background:#D94E1A}

.err{background:#FEF2F2;border:1px solid #FECACA;color:#EF4444;padding:12px 16px;border-radius:10px;font-size:.85rem;margin-bottom:14px;display:none}
.err.show{display:block}
.suc{background:#F0FDF4;border:1px solid #86EFAC;color:#16A34A;padding:12px 16px;border-radius:10px;font-size:.85rem;margin-bottom:14px;display:none}
.suc.show{display:block}

.login-link{text-align:center;margin-top:18px;font-size:.82rem;color:#6B7280}
.login-link a{color:#F05A22;font-weight:700;text-decoration:none}
.login-link a:hover{text-decoration:underline}

.password-hint{font-size:.7rem;color:#9CA3AF;margin-top:5px}

.req-badge{display:inline-block;background:#FFF0EB;color:#F05A22;border:1px solid rgba(240,90,34,.2);border-radius:4px;font-size:.6rem;font-weight:700;padding:1px 6px;margin-left:4px;vertical-align:middle;text-transform:uppercase}
</style>
</head>
<body>
<div class="deco d1"></div>
<div class="deco d2"></div>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">📦</div>
    <div class="brand-name">SHIP<em>ORAX</em></div>
  </div>
  <div class="card">
    <div class="header">
      <div class="icon-wrap">✍️</div>
      <h1>Create Account</h1>
      <p>Register to start shipping with SHIPORAX</p>
    </div>

    <div class="err" id="reg-error"></div>
    <div class="suc" id="reg-success"></div>

    <form onsubmit="doRegister(event)" autocomplete="off">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name <span class="req-badge">Required</span></label>
          <input type="text" id="name" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label>Phone <span class="req-badge">Required</span></label>
          <input type="tel" id="phone" placeholder="9876543210" required maxlength="10" pattern="[0-9]{10}"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address <span class="req-badge">Required</span></label>
        <input type="email" id="email" placeholder="you@company.com" required/>
      </div>
      <div class="form-group">
        <label>Company / Business Name</label>
        <input type="text" id="company" placeholder="Your Company Pvt. Ltd."/>
      </div>

      <div class="divider"><hr/><span>Set Password</span><hr/></div>

      <div class="form-row">
        <div class="form-group">
          <label>Password <span class="req-badge">Required</span></label>
          <input type="password" id="password" placeholder="Min 6 chars" required minlength="6"/>
        </div>
        <div class="form-group">
          <label>Confirm Password <span class="req-badge">Required</span></label>
          <input type="password" id="password2" placeholder="Repeat" required minlength="6"/>
        </div>
      </div>
      <div class="password-hint">Password must be at least 6 characters long.</div>

      <br/>
      <button class="btn btn-primary" id="reg-btn" type="submit">🚀 Create My Account</button>
    </form>
  </div>
  <div class="login-link">Already have an account? <a href="/client/login">Sign In →</a></div>
</div>
<script>
function showErr(msg){const e=document.getElementById('reg-error');e.textContent=msg;e.classList.add('show');document.getElementById('reg-success').classList.remove('show')}
function showSuc(msg){const e=document.getElementById('reg-success');e.textContent=msg;e.classList.add('show');document.getElementById('reg-error').classList.remove('show')}
function hideAll(){document.getElementById('reg-error').classList.remove('show');document.getElementById('reg-success').classList.remove('show')}

async function doRegister(e){
  e.preventDefault(); hideAll();
  const pass = document.getElementById('password').value;
  const pass2 = document.getElementById('password2').value;
  if(pass !== pass2){ showErr('Passwords do not match.'); return; }
  if(pass.length < 6){ showErr('Password must be at least 6 characters.'); return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  try{
    const r = await fetch('/api/auth/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        companyName: document.getElementById('company').value.trim(),
        password: pass,
        role: 'client'
      })
    });
    const d = await r.json();
    if(!d.success){ showErr(d.message || 'Registration failed. Please try again.'); return; }
    showSuc('✅ Account created! Redirecting to login...');
    setTimeout(() => window.location.href = '/client/login', 1800);
  }catch(err){ showErr('Network error. Please try again.'); }
  finally{ btn.disabled = false; btn.innerHTML = '🚀 Create My Account'; }
}
</script>
</body>
</html>
