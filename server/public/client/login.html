<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SHIPORAX – Client Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#F1F3F8;position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle at 1px 1px,rgba(13,27,62,.05) 1px,transparent 0);
  background-size:36px 36px;
}
.deco{position:fixed;border-radius:50%;pointer-events:none}
.d1{width:500px;height:500px;background:radial-gradient(rgba(240,90,34,.12),transparent);top:-150px;right:-120px}
.d2{width:400px;height:400px;background:radial-gradient(rgba(13,27,62,.1),transparent);bottom:-100px;left:-80px}

.wrap{position:relative;z-index:10;width:100%;max-width:420px;padding:20px}

.brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
.brand-icon{width:48px;height:48px;border-radius:14px;background:#F05A22;display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 8px 24px rgba(240,90,34,.3)}
.brand-name{font-size:1.5rem;font-weight:800;color:#0D1B3E;letter-spacing:-.03em}
.brand-name em{color:#F05A22;font-style:normal}

.card{
  background:#fff;border:1.5px solid #E5E7EB;border-radius:20px;padding:36px;
  box-shadow:0 4px 24px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#0D1B3E,#1A2F5E,#F05A22);border-radius:20px 20px 0 0}

.header{text-align:center;margin-bottom:28px}
.icon-wrap{width:72px;height:72px;border-radius:18px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:2rem;background:rgba(240,90,34,.08);border:1.5px solid rgba(240,90,34,.2)}
.header h1{font-size:1.6rem;font-weight:800;color:#0D1B3E;letter-spacing:-.03em}
.header p{color:#6B7280;font-size:.875rem;margin-top:6px}
.header .badge{display:inline-flex;align-items:center;gap:5px;background:rgba(240,90,34,.08);color:#F05A22;border:1px solid rgba(240,90,34,.2);padding:4px 14px;border-radius:999px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:10px}

.form-group{margin-bottom:16px}
label{display:block;font-size:.72rem;font-weight:600;color:#374151;margin-bottom:7px;text-transform:uppercase;letter-spacing:.07em}
input{width:100%;padding:13px 16px;border:1.5px solid #D1D5DB;border-radius:11px;font-size:.95rem;outline:none;background:#FAFBFF;color:#0D1B3E;transition:.2s;font-family:'Inter',sans-serif}
input::placeholder{color:#9CA3AF}
input:focus{background:#fff;border-color:#F05A22;box-shadow:0 0 0 3px rgba(240,90,34,.1)}

.btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-primary{background:#0D1B3E;color:#fff;box-shadow:0 4px 16px rgba(13,27,62,.3)}
.btn-primary:hover{background:#1A2F5E}

.err{background:#FEF2F2;border:1px solid #FECACA;color:#EF4444;padding:12px 16px;border-radius:10px;font-size:.85rem;margin-bottom:16px;display:none}
.err.show{display:block}

.footer-note{text-align:center;margin-top:16px;font-size:.78rem;color:#9CA3AF}
</style>
</head>
<body>
<div class="deco d1"></div>
<div class="deco d2"></div>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">📦</div>
    <div class="brand-name">SHIP<em>ORAX</em></div>
  </div>
  <div class="card">
    <div class="header">
      <div class="icon-wrap">🚚</div>
      <h1>Client Portal</h1>
      <p>Login to manage your shipments</p>
      <div class="badge">📦 Shipper Access</div>
    </div>
    <div class="err" id="login-error"></div>
    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••••" required autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" id="login-btn" type="submit">🚚 Sign In</button>
    </form>
  </div>
  <div class="footer-note">Don't have access? Contact your SHIPORAX administrator.</div>
</div>
<script>
function showErr(msg){const e=document.getElementById('login-error');e.textContent=msg;e.classList.add('show')}
function hideErr(){document.getElementById('login-error').classList.remove('show')}

async function doLogin(e){
  e.preventDefault();hideErr();
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='Signing in...';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value.trim(),password:document.getElementById('password').value})});
    const d=await r.json();
    if(!d.success){showErr(d.message||'Login failed');return;}
    if(d.user.role==='admin'){showErr('⚠️ This is an admin account. Please use the Admin Portal to sign in.');return;}
    localStorage.setItem('client_token',d.token);
    localStorage.setItem('client_user',JSON.stringify(d.user));
    window.location.href='/client/';
  }catch(err){showErr('Network error. Please try again.')}
  finally{btn.disabled=false;btn.innerHTML='🚚 Sign In'}
}
</script>
</body>
</html>
