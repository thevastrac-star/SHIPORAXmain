<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SHIPORAX – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#F0EFFE 0%,#F5F6FA 50%,#E6F7F5 100%);
  position:relative;overflow:hidden;
}
/* Subtle pattern */
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle at 1px 1px,rgba(80,70,228,.08) 1px,transparent 0);
  background-size:36px 36px;z-index:0;
}
.wrap{
  position:relative;z-index:10;
  display:flex;gap:24px;max-width:940px;width:100%;padding:24px;align-items:stretch;
}
/* Big decorative circles */
.deco{position:fixed;border-radius:50%;z-index:0}
.deco1{width:500px;height:500px;background:radial-gradient(#5046E420,transparent);top:-120px;right:-100px}
.deco2{width:400px;height:400px;background:radial-gradient(#0A9E8918,transparent);bottom:-100px;left:-80px}
.deco3{width:300px;height:300px;background:radial-gradient(#E8400C12,transparent);top:40%;right:20%}

/* TOP LOGO */
.top-logo{text-align:center;margin-bottom:28px;}
.brand{display:inline-flex;align-items:center;gap:14px}
.brand-icon{
  width:56px;height:56px;border-radius:17px;
  background:linear-gradient(135deg,#E8400C,#FF6535);
  display:flex;align-items:center;justify-content:center;font-size:1.7rem;
  box-shadow:0 8px 24px rgba(232,64,12,.35);
}
.brand-name{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:2rem;font-weight:900;color:#12172B;letter-spacing:-.05em;
}
.brand-name em{color:#E8400C;font-style:normal}
.tagline{color:#7A82A0;font-size:.82rem;margin-top:4px;font-weight:500}

/* PANELS */
.panels{display:flex;gap:22px;align-items:stretch}
.panel{
  flex:1;background:#fff;
  border:1.5px solid #E4E7EF;border-radius:22px;padding:36px 32px;
  box-shadow:0 4px 20px rgba(18,23,43,.06),0 16px 48px rgba(18,23,43,.05);
  position:relative;overflow:hidden;transition:.25s;
}
.panel:hover{box-shadow:0 8px 32px rgba(18,23,43,.1),0 24px 64px rgba(18,23,43,.07);transform:translateY(-2px)}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:22px 22px 0 0}
.admin-panel::before{background:linear-gradient(90deg,#5046E4,#6C62F5,#0A9E89)}
.client-panel::before{background:linear-gradient(90deg,#E8400C,#FF6535,#FFCC00)}

.ph{text-align:center;margin-bottom:28px}
.pi{
  width:78px;height:78px;border-radius:22px;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;font-size:2.1rem;
}
.pi-admin{background:linear-gradient(135deg,#F0EFFE,#E8E5FF);border:1.5px solid #C9C5FC;box-shadow:0 8px 24px rgba(80,70,228,.15)}
.pi-client{background:linear-gradient(135deg,#FFF0EB,#FFE4D9);border:1.5px solid #FFD4C2;box-shadow:0 8px 24px rgba(232,64,12,.15)}
.ph h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.6rem;font-weight:800;color:#12172B;letter-spacing:-.03em}
.ph p{color:#7A82A0;font-size:.88rem;margin-top:5px}
.role-badge{
  display:inline-block;margin-top:10px;padding:5px 14px;border-radius:999px;
  font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
}
.badge-admin{background:#F0EFFE;color:#5046E4;border:1px solid #C9C5FC}
.badge-client{background:#FFF0EB;color:#E8400C;border:1px solid #FFD4C2}

/* FORM */
.form-group{margin-bottom:16px}
label{display:block;font-size:.75rem;font-weight:600;color:#3D4560;margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em}
input{
  width:100%;padding:14px 16px;border:1.5px solid #D1D5E4;border-radius:12px;
  font-size:.95rem;outline:none;background:#FAFBFF;color:#12172B;
  transition:.2s;font-family:'DM Sans',sans-serif;
}
input:focus{background:#fff;border-color:#5046E4;box-shadow:0 0 0 3px rgba(80,70,228,.1)}
.client-panel input:focus{border-color:#E8400C;box-shadow:0 0 0 3px rgba(232,64,12,.1)}
input::placeholder{color:#B0B8CC}

.btn{
  width:100%;padding:16px;border:none;border-radius:13px;
  font-size:1rem;font-weight:700;cursor:pointer;transition:.22s;
  font-family:'DM Sans',sans-serif;letter-spacing:.01em;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-admin{
  background:linear-gradient(135deg,#5046E4,#6C62F5);color:#fff;
  box-shadow:0 6px 20px rgba(80,70,228,.35);margin-top:6px;
}
.btn-admin:hover{box-shadow:0 10px 28px rgba(80,70,228,.5)}
.btn-client{
  background:linear-gradient(135deg,#E8400C,#FF6535);color:#fff;
  box-shadow:0 6px 20px rgba(232,64,12,.35);margin-top:6px;
}
.btn-client:hover{box-shadow:0 10px 28px rgba(232,64,12,.5)}
.btn-ghost{
  background:#F5F6FA;color:#3D4560;border:1.5px solid #E4E7EF;margin-top:8px;
}
.btn-ghost:hover{background:#ECEEF4}

.error{
  background:#FDEAEA;color:#C62828;padding:12px 16px;border-radius:10px;
  font-size:.84rem;margin-bottom:14px;display:none;border-left:3px solid #E03030;
}
.sep{text-align:center;color:#B0B8CC;font-size:.75rem;margin:14px 0;position:relative}
.sep::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#E4E7EF}
.sep span{padding:0 12px;position:relative;background:#fff}

#reg-form{margin-top:16px;border-top:1.5px solid #E4E7EF;padding-top:16px;display:none}
#reg-form .form-group{margin-bottom:12px}
#reg-form label{font-size:.72rem}
#reg-form input{padding:12px 15px}
.reg-hint{text-align:center;font-size:.82rem;color:#7A82A0;margin-top:14px}
.reg-hint a{color:#E8400C;font-weight:600;cursor:pointer;text-decoration:none}
.reg-hint a:hover{text-decoration:underline}

@media(max-width:700px){
  .panels{flex-direction:column}
  .panel{padding:26px 20px}
  .btn{padding:17px}
  input{padding:14px}
}
</style>
</head>
<body>
<div class="orb o2"></div><div class="orb o3"></div></div>
<div class="page">
  <div class="top-logo">
    <div class="brand">
      <div class="brand-icon">🚀</div>
      <div>
        <div class="brand-name">Shipo<em>RAX</em></div>
        <div class="tagline">India's Smartest Shipping Platform</div>
      </div>
    </div>
  </div>

  <div class="panels">

    <!-- ADMIN -->
    <div class="panel admin-panel">
      <div class="ph">
        <div class="pi pi-admin">🛠️</div>
        <h2>Admin Panel</h2>
        <p>Manage orders, users &amp; platform settings</p>
        <div class="badge badge-admin">🔐 Admin Only</div>
      </div>
      <div class="error" id="admin-error"></div>
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" id="admin-email" placeholder="admin@shiporax.com" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="admin-password" placeholder="Enter your password"
          onkeydown="if(event.key==='Enter')loginAdmin()"/>
      </div>
      <button class="btn btn-admin" id="admin-btn" onclick="loginAdmin()">
        🔐 &nbsp;Login to Admin Panel
      </button>
    </div>

    <!-- CLIENT -->
    <div class="panel client-panel">
      <div class="ph">
        <div class="pi pi-client">📦</div>
        <h2>Client Login</h2>
        <p>Ship smarter — manage all your orders</p>
        <div class="badge badge-client">🚚 Seller &amp; Business Login</div>
      </div>
      <div class="error" id="client-error"></div>
      <div class="form-group">
        <label>Your Email</label>
        <input type="email" id="client-email" placeholder="you@yourcompany.com" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="client-password" placeholder="Enter your password"
          onkeydown="if(event.key==='Enter')loginClient()"/>
      </div>
      <button class="btn btn-client" id="client-btn" onclick="loginClient()">
        🚀 &nbsp;Login to My Account
      </button>

      <div class="reg-hint">
        New here? <a onclick="toggleRegister()">Create a free account →</a>
      </div>

      <div id="reg-form">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="reg-name" placeholder="e.g. Ramesh Kumar"/>
        </div>
        <div class="form-group">
          <label>Company / Shop Name *</label>
          <input type="text" id="reg-company" placeholder="e.g. Kumar Traders, MyShop"/>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="reg-email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="reg-phone" placeholder="10-digit mobile number" maxlength="10"/>
        </div>
        <div class="form-group">
          <label>Create Password *</label>
          <input type="password" id="reg-password" placeholder="Minimum 6 characters"/>
        </div>
        <button class="btn btn-client" onclick="registerClient()">
          ✅ &nbsp;Create Account — It's Free!
        </button>
        <div class="reg-hint" style="margin-top:10px">
          Already have account? <a onclick="toggleRegister()">Login instead →</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API=(window.__API_URL||'')+'/api';

window.onload=()=>{
  if(localStorage.getItem('admin_token')) window.location.href='/admin';
  else if(localStorage.getItem('client_token')) window.location.href='/client';
  spawnParticles();
};

function spawnParticles(){
  const c=null && document.getElementById('pts');
  const cols=['#FF6B35','#00C9A7','#7C3AED','#FF8C42','#2563EB','#FFCC00'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div');
    d.className='particle';
    d.style.cssText=`left:${Math.random()*100}vw;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*12}s;animation-duration:${9+Math.random()*8}s`;
    c.appendChild(d);
  }
}

function showErr(id,msg){
  const e=document.getElementById(id);
  e.textContent=msg;e.style.display='block';
  setTimeout(()=>e.style.display='none',5500);
}
function setBtn(id,loading,txt){
  const b=document.getElementById(id);
  b.disabled=loading;
  if(!loading)b.textContent=txt;
  else b.textContent='⏳  Please wait...';
}

async function loginAdmin(){
  const email=document.getElementById('admin-email').value.trim();
  const password=document.getElementById('admin-password').value;
  if(!email||!password){showErr('admin-error','⚠️ Please enter your email and password');return;}
  setBtn('admin-btn',true);
  try{
    const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(d.success&&d.user.role==='admin'){
      localStorage.setItem('admin_token',d.token);
      localStorage.setItem('admin_user',JSON.stringify(d.user));
      window.location.href='/admin';
    }else if(d.success&&d.user.role!=='admin'){
      showErr('admin-error','⚠️ This is a client account. Use Client Login on the right.');
    }else{
      showErr('admin-error','❌ '+(d.message||'Wrong email or password'));
    }
  }catch(e){showErr('admin-error','🔌 Network error. Please try again.');}
  setBtn('admin-btn',false,'🔐  Login to Admin Panel');
}

async function loginClient(){
  const email=document.getElementById('client-email').value.trim();
  const password=document.getElementById('client-password').value;
  if(!email||!password){showErr('client-error','⚠️ Please enter your email and password');return;}
  setBtn('client-btn',true);
  try{
    const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(d.success&&d.user.role==='client'){
      localStorage.setItem('client_token',d.token);
      localStorage.setItem('client_user',JSON.stringify(d.user));
      window.location.href='/client';
    }else if(d.success&&d.user.role!=='client'){
      showErr('client-error','⚠️ Admin account detected. Please use Admin Login on the left.');
    }else{
      showErr('client-error','❌ '+(d.message||'Wrong email or password'));
    }
  }catch(e){showErr('client-error','🔌 Network error. Please try again.');}
  setBtn('client-btn',false,'🚀  Login to My Account');
}

function toggleRegister(){
  const f=document.getElementById('reg-form');
  const hint=document.querySelector('.reg-hint');
  const show=f.style.display==='none'||!f.style.display;
  f.style.display=show?'block':'none';
}

async function registerClient(){
  const name=document.getElementById('reg-name').value.trim();
  const company=document.getElementById('reg-company').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const phone=document.getElementById('reg-phone').value.trim();
  const password=document.getElementById('reg-password').value;
  if(!name||!email||!password){showErr('client-error','⚠️ Please fill Name, Email and Password');return;}
  if(password.length<6){showErr('client-error','⚠️ Password must be at least 6 characters');return;}
  try{
    const r=await fetch(API+'/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,email,password,phone,companyName:company,role:'client'})});
    const d=await r.json();
    if(d.success){
      localStorage.setItem('client_token',d.token);
      localStorage.setItem('client_user',JSON.stringify(d.user));
      window.location.href='/client';
    }else{showErr('client-error','❌ '+(d.message||'Registration failed'));}
  }catch(e){showErr('client-error','🔌 Network error');}
}
</script>
</body>
</html>
